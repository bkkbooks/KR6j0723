body:
  text: 大清欽賜雲南法界寺講經廣陵沙門溥畹述良以聖教綱宗理原一貫其如尋羊覔跡自惑多岐故迷雲布乎覺海而陰霾起於晴虗致華屋之門恆封荊棘則如來之藏永錮凡愚諦思佛語分明但惜人言舛錯既乖了義復誤初機余故往往蒲團對月石上松間執卷披文難禁浩歎由是草年玩味午夜參究遍搜諸注精英直探本經的旨務在仰體聖意以契合經文委示大定而指明心性漫云錦上鋪花聊自眼中除屑茲述是疏先標懸敘秉承賢首總啓十門一教起因緣二藏乘分攝三教義分齊四所被機宜五能詮體性六所詮宗趣七教迹前後八傳譯時年九通釋名題十別解文義一教起因緣者以諸世間凡舉一事必有所為因緣況佛大教豈無故而然耶因緣有二一總二別總者謂酬因酬請顯理度生一代教興皆繇此矣原佛本意唯為一大事因緣欲令衆生開示悟入佛之知見然此知見衆生本有迷不自知故淪生死佛於因中悟得此理發願成佛普示衆生故今五時諸教雖有權實頓漸偏圓不定等說而其本意唯為一大事耳此乃諸教之總因緣也別則有十一為䇿進多聞二為尅示真定三為揀別真妄四為直指人心五為拔除貪欲六為堅持淨戒七為巧示修門八為證入有階九為決疑警滯十為顯正破邪一為䇿進多聞者正為多聞誤墮以警狂慧䇿進於真修也良以此經因淫席發起以提獎開端自尊者從淫室歸來即云恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便故後佛責之曰縱能憶持十二部經清淨妙理不如一日修無漏業文殊亦言將聞持佛佛何不自聞聞故論云阿難種種諸經聽持通利智慧多攝心少一遭登伽之難十二部經積劫憶持如瀉瓶水者如風如影無可憑依乃始自責無功回心請定若非登伽一番遣攝則阿難尚沉多聞藏海歷劫依然未必能猛利破除熏修無漏也茲以多聞士為緣起者正為後世聰明人作警䇿之榜樣耳故勞如來放頂光以除貪愛說頂法而拔欲泥普破大地牢關頓釋人天羈鎖若曰以毒攻毒則惡呪乃䇿進之機畜聞返聞而淫女正熏修之導總之示徒聞之無功勸真修而有益以是之故而說此經二為剋示真定者蓋當機被攝由無真定故有妙奢之請而佛許云有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路此示真定也良以世出世間凡外權小均各有定然無究竟者緣其所依定體皆用生滅識心非不生滅真實心也故經云縱滅一切見聞覺知內守幽閒猶為法塵分別影事斯則一切人天初心修定未能決擇鮮有不用此心者也即四禪八定雖奮精研亦不越是又云分別都無非色非空拘舍離等昧為冥諦是則一切外道所修邪定亦用此心又言世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實由是則知一切權小亦用此心故阿難云若此發明不是心者我乃無心同諸土木兼此大衆無不驚疑據此則一切凡外權小莫不執此為真實心也然欲修此真定須先揀去生滅妄識而必認取真心以故佛就根中指出見聞等性乃至擎拳屈指左右飛光會三科融七大藉鍾聲借杵響莫非顯此周遍圓融真常不動無生無滅之真心也故四卷末云若棄生滅守於常光常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺然此定體即常住真心性淨明體設以十軸雄文要而論之統唯一定故經初云有三摩提名大佛頂首楞嚴王等則知一切三昧靡不統攝故吳江釋為一經總相法門良有味焉即下十番顯示以及三科七大皆云本如來藏妙真如性者正指妙定真體也即阿難大衆各各自知心精遍圓包褁十方觀空如葉視身猶塵正信真定之理而明真定之體也乃至滿慈章中發明萬法生續五大圓融備彰三藏大衆獲益正解真定之理而獲真定之體也於四卷半後明發覺初心二決定義以至三七行道十方佛現二十五聖各說圓通是以正助之事而示真定之行也從十二類生至三漸次安立五十五位此又以迷悟之事而顯真定之證也至於經末五重陰魔乃指通定之妄境也由是而知則一經所談信解者乃真定之理體行證者即真定之事用也固知欲求真定須識真心但識真心即名真定是以經云譬如琴瑟箜篌雖有妙音若無妙指終不能發即此謂也而佛為指示真定故說此經三為揀別真妄者揀謂揀去其妄別謂辨別其真即本經二種根本是也云何二種一者無始生死根本則汝今者用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者此佛示當機真妄本也然欲揀別非善用平等方便二門者則不可耳何為平等良以萬法原本一心既唯一心則真妄虗實邪正是非一切差別修證之相悉不可得故名平等云何方便以理雖是一而事有千差故不妨于諸法中顯真破妄辨正排邪許是斥非明修示證故名方便是以如來雙用二門先將方便決擇真妄始破七處妄識終破非不和合故於識則決定破其為妄而令捨之於見性則決定顯其為真而令取之此方便門也然真妄既明藏體既顯若獨局於根中不與萬法融會則何以稱圓妙大定者哉故次用平等普融真妄始自會通四科遍歷七大終至圓彰三藏普責思議是則塵尚不揀識何擇焉以其本無一法可分真妄所謂平等門也然此二門猶體之與用相資相助不可偏廢者也設無方便則真妄混淆是非莫辨何以尅體見真若缺平等則真妄永隔是非顯然何能稱圓而曰妙哉故談性定須善二門方成圓妙佛為顯真破妄融會妄真示此二門故說此經四為直指人心者乃佛就衆生六根門頭指示見聞等性即常住真心也以故當機初請三昧佛即先審發心既陳愛見之源全迷真實之體故曉之曰一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉又曰此真妙明即是菩提涅槃元清淨體及至當機自責不知寂常如來許可發妙明心故即當機現前身中指出見性曰是心非眼只此一句已是分明的指然似口行人事所以不動章中如來屈指左右飛光正是覿面相呈此時當機向六根門頭始識不動主人故滿口招承話會已上不唯此處即前破識文中舉拳相示一咄徵心乃是斥印交馳言思迥絶以此觀之何一言不是直指人心何一處不可見性成佛總之如來即教明宗不看他人面目沿至後世將宗判教轉成第二義門故難免於盲瞽之流以如來禪祖師禪自立疆界妄分優劣也即其向後羅云擊鐘使伊親驗睡人夢杵令渠自知是皆如來徹底掀翻和盤托出斬新條令出格光鋩全提殺活直指人心處也故知此經始終一貫唯指人心別無餘事所以當機正請妙定世尊且問發心欲其生信則廣破七處顯示十番通會四科圓彰七大以明遍法界之真心全體欲其開解則明生續之由圓融之故以一心而為萬法會萬法而歸一心是以一心顯萬法之本體也然欲示之以行則雙明正助各述圓通而至獨選聞性再說呪心顯密互陳無非為資發此心之妙用耳欲示之以證則與之論迷悟談染淨轉類生成聖位是皆正顯此心之大用也即重說章談七趣則本乎心之內分外分辨五魔則由于心之愛念邪思是知一經所詮若染若淨若聖若凡乃至真妄邪正因緣自然一切皆心更無別法而直指真詮豈復有過於此者乎是知如來為直指人心故說此經五為拔除貪欲者良以衆生相續咸由貪欲成因七趣輪回均依情想為本故知四生六道天上人間雖獲升沉有異同歸生死無殊求其所以莫不皆中貪欲情想之毒箭耳故言一切衆生皆以淫欲而正性命倘淫欲不斷則生死難辭欲出生死須除淫欲故我如來普欲衆生咸除斯箭乃因寵弟誤墮淫室由是從無見頂放無畏光現無為佛說無上呪然非大智之人莫尅拔除情欲毒箭故遣文殊將呪往護正向烈火場中傾此清凉甘露也是以登伽淫心始歇而當機戒體方全然後提撕獎勸令歸佛所故登伽淫女愛河乾枯於佛法中成精進林且與耶輸同悟宿因貪愛為苦俱成聖果則愛結永離邪淫永斷正是骷髏粉膩頓化香光淫亂身心圓成聖果斯正斷淫欲而出生死之龜鑑也然在本經詳明始末皆以離欲為要故當機見佛相好便謂此相非是欲愛所生所以者何欲氣粗濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落而至滿慈章內衆生相續則曰想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本乃至四種明誨首云六道衆生其心不淫則不隨其生死相續汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道而十習因且以淫習居首至六交報甚明欲報為尤所以三毒之中貪欲最毒而諸衰之內女色最衰故遭之者莫不喪法身而傷慧命淪生死而受輪回噫毒矣哉斯之為箭也故文殊勸進當機則語之曰欲漏不先除畜聞成過誤以是而觀則多聞智者一著此箭尚無增進之階返成過誤而況愚癡凡流及無聞之啞羊者乎故七趣中以情想而分升墜至五陰內即貪欲以辨魔羅是知欲修真定先去淫心如不斷淫必歸魔道故寶蓮私行以陷獄烏芻生厭而證真所以如來為除貪欲箭故而說此經六為堅持淨戒者以本經正旨雖明定慧均修設無淨戒為基則定慧亦難成就以故如來一經始末諄諄發明無非欲人持淨戒而修定慧也故於證信開章經家便敘嚴淨毗尼弘範三界而於發起誤墮則曰將毀戒體及至正宗文中示行章內原無別法佛惟告言汝常聞我毗奈耶中宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學又言云何攝心我名為戒若諸世界六道衆生其心不淫則不隨其生死相續乃至汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨又諸世界六道衆生其心不殺則不隨其生死相續以至汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨又復世界六道衆生其心不偷則不隨其生死相續以至汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨更云如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種以至汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨然即示證三漸次中除助因刳正性違現業無非仗此始得中中流入五十五位莫不以是為基故知戒為無上菩提本應當一心持淨戒即七趣章則人天善道乃由戒善離欲而升餘諸惡趣因失戒善貪欲而墮是故五陰魔羅唯欲非毀戒律疑誤衆生專謗持戒清淨比丘為小乘道是知讚乃賢聖謗即妖魔故凡欲修性定妙慧者必先持此皎若冰霜併誦心呪以建根基則入三摩地方無委曲不然所修行業悉為魔鬼攝持是以如來欲為修定慧者持淨戒故而說此經七為巧示修門者即善巧指示修行要門此取用力少而收功多也由因當機於四卷半後雖欣藏性已知復喻華屋未入而更請曰我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入此正請修之意也然復問云從何攝伏疇昔攀緣入佛知見如來告以二決定義以為發覺初心首令以湛旋妄成不生滅次令審詳煩惱知根降伏但得一根既返餘根自旋諸妄既銷不真何待然後如來遍詢大衆令陳最初入道法門由是諸聖略說而觀音廣陳佛命文殊一一揀選獨取觀音耳根為最故云此方真教體清淨在音聞欲取三摩地實以聞中入故知此定唯一返聞別無餘事是最簡最略極為省要而修習之法善且巧者莫妙於斯是知佛為巧示修門故而說此經八為證入有階者所謂理固頓悟事須漸除雖圓頓修習一超直入不落階差然猶快刀截紙不無層次鵬翮搏風奚離丈尺正圓融不礙於行布且行布無礙於圓融固知理絶修證不妨事存階漸設偏一則落空有須圓具方融真俗乃不離寂滅而建立諸位也始從漸次終乎極果於如幻三摩地中立五十五位所謂不斷而斷惑障原空非證而證妙用斯備豈同魔外都無位次者哉故仁王經云若言越此地位得成佛者是魔所說且本經亦言是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入是知佛為示人證入有階故說此經九為決疑警滯者為決破疑團而警策淹滯也細析一經之內疑網交羅始從七處推窮繼以十番辨析且當機自謂見必我真我今身心復是何物又言云何得知是我真性又云兼此大衆無不驚疑乃至云拔我疑根歸無上道而滿慈亦疑萬法生續五大圓融直饒大智文殊尚有精見色空之辨而況餘者諦觀如來正似金剛王劍無論大小疑團觸著撞著莫不土崩瓦解者矣至最後警䇿淹滯者以當機復疑生佛之體本來清淨云何復有地獄等趣故佛重說內分外分廣明七趣均屬輪回此正䇿進淹滯之深意也是知世尊始終皆為決疑警滯故說此經十為顯正破邪者乃係世尊最後慈悲懸愍後學力弱魔強特指陰內之魔通示定中之境每有十種共成五十分析邪源發明利害使末世修正定者不為所惑斯則如來資正破邪之本致也然在諸經雖明五陰而未細析根源今則凡破一陰則出一種妄想正為盡袪邪源以杜魔魅而後已也然破則從粗至細起則自細成粗緣其根本唯一識陰原無別體然此識陰即是真常以故經云湛入合湛歸識邊際是知五陰全體皆妄而當體即真然修定者但能達妄本空自必知真本有故云狂心歇處即菩提耳是以本經云彼塵勞內汝妙覺中如風吹光如刀割水魔由定起還依定滅用定治魔如湯消雪唯在修此定者善覺照耳故知佛為指示正定欲破邪魔而說此經二藏乘分攝者若准圓覺疏釋則有三門所謂初藏次乘後分也且初藏者復有三二之別今確論所詮從正而不從兼取多分而不取少分則經詮定學律詮戒學論詮慧學而斯經多談大定正詮定學雖有少分起行之戒論議之慧是但所兼而非正也故知斯經三藏之中修多羅攝至於二藏定屬菩薩不屬聲聞以當機所請皆菩薩事也然雖兼說心呪名標灌頂而信解行證顯說較密過數十倍是但以密助顯而實非密藏所收也若此攝彼則兼該二三亦通密攝以持戒證果有小乘故徵難辨析最明顯故誦呪除障乃密資故次乘攝者然有開合之異故開之則有三有四有五而合之則統是一乘故言十方佛土中惟此一乘法無二亦無三是三尚不有而況四於五哉然此亦有同教別教之分斯經正惟同教一乘而兼屬別教一乘若此攝彼則三五全該以四重三漸乃至七趣因果俱彰尚不遺其人天而況餘乘者乎後分攝者長水謂契經方廣二分所攝若以此經攝彼十二分者兼通十一唯不攝本生耳三教義分齊者文之實曰義事之主曰理又義乃相也理即體也故聖人之設教也理以統之義以析之理雖至一而逐機則有淺深義固多方然歸理原無別體是則諸經義理既有淺深而明經者設不辨別何以知其分齊之所詣乎斯經長水所遵華嚴大疏起信全文夫賢首老人命世宗師誠可遵尚然彼既悉茲不煩引今唯述略指廣可也彼開有二一約教通局二約法生起而約教中從淺向深教類有五一小乘教但說人空從少說法空亦不明顯唯依六識三毒建立染淨根本二大乘始教亦名分教但說諸法皆空有遮無表未盡法源故名為始唯談一切法相有不成佛故名為分三大乘終教亦名實教說如來藏隨緣成阿賴耶識緣起無性一切皆如定性二乘無性闡提悉當或佛方盡大乘至極之談故名為終以稱實理復名為實四大乘頓教總不說法相惟辨真性亦無八識差別之相呵教勸離毀相泯心但一念不生即名為佛不依地位漸次故說為頓五一乘圓教所說一真法界性相圓融緣起無礙相即相入帝網重重主伴無盡也若將此經於五教中明分齊者即所指見聞等性近具根中遍為四科七大體性乃如來藏真如隨緣所成陀那細識即黎耶別名而異生翻染小乘向大皆當成佛正屬終實之教而歇即菩提圓照法界兼屬頓圓二教若以教攝經五唯後三攝此設以經攝教則此可以全攝彼五以不廢小教果法戒品而兼存始教八識三空故也二約法生起中從本起末亦有五重淺深然所約者即起信論文而分屬者亦不離於五教但從深至淺為異前門耳初唯一心為本源即一真法界該四法界此圓教分齊也二依一心開二門即該二教一心真如門所謂真性不生不滅即頓教分齊二心生滅門謂依如來藏與生滅合名阿黎耶識即終教分齊三依此識明二義一覺義謂心體離念等二不覺義謂不如實知真如法一不覺心動等四依後義生三細一依不覺故心動名業相二依動故能見名轉相三依見故境界妄現名現相五依最後生六粗一智相乃依境分別法執俱生也二相續相即依智起念不斷乃法執分別也即始教相宗分齊以彼宗不達此等與真如同依一心為源故說真如不許隨緣生法唯齊業識縱轉成智亦終有為而不同真故三執取相由心起著即我執俱生四計名字相此我執分別也上四皆惑五起業相即所造業也六業繫苦相即受報也第三四小教分齊第五六人天分齊設以諸教就此五重統論分齊者則人天唯齊業報小乘齊後二粗法相極於三細終頓圓通乎本末方窮初唯一心之本源也若此五中單明斯經分齊者察其文義廣明從真起妄以至三細六粗復說返妄歸真與夫會融真妄參而考之此正顯然齊於心生滅門而為終實分齊若更細研融會諸妄而歸藏性則兼齊於心真如門亦不違前兼頓教也然真妄會融既以妙極於法界真心三如來藏是亦兼齊於一心本源合前圓教分齊也若欲通詮小始則三種相續七趣升沉且人天尚猶不遺而況小始教耶是知此經俱詮本末足見幽深殆於法華圓覺同條共貫其亦圓實之奧典也四所被機宜者應分通局收揀但古德謂揀去非機而今則揀定當機也所謂通則普收局乃別揀茲明通收者以終實之教明一切衆生凡有心者皆當作佛斯經既談楞嚴性定成佛真因則何一人而非所被故云一切衆生從無始來生死相續皆由不知常住真心用諸妄想又曰一切衆生業種自然如惡叉聚諸修行人不成菩提乃至別成聲聞緣覺諸天魔外皆由不知二種根本錯亂修習由此而推則無一人而非此經所被乃通收之至也然此何故而復有局揀之意以通收中所被雖廣設若論益則多遠因而非近益但成結緣之衆耳今欲取其聞法領解機教相扣故不得不局以文義揀定當機也約義有二初據文說小次以義推大今初據文有四本經乃阿難當機迹在小乘故佛急欲引小入大所以經言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提等是也於中分四一被有學聲聞經云憐愍阿難及諸會中諸有學者又曰亦令將來諸有漏者獲菩提果是也二被無學聲聞經云告富樓那及諸會中漏盡無學諸阿羅漢是也三兼被緣覺經云哀愍會中緣覺聲聞於菩提心未自在者是也四並被定不定性經云令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等是也是皆據文說小以明正被之當機也次以義推大者在經雖未明言然以義推則小機尚被而大豈見遺但為急欲引小故特逐節顯標而被大之意自在其中矣故經云吾今為汝建大法幢亦令十方一切衆生獲妙微密等又云及為當來佛滅度後末法衆生發菩提心開無上乘妙修行路等又云亦為未來一切衆生為出世因作將來眼夫既屢云一切而又曰末世發菩提者即知不獨被小亦兼被大不唯現在亦兼未來可以明矣然約其大應有六謂權乘二而圓實四也權乘二者謂法相宗人動執法相而不能以性相融者二破相宗人觸言賓無而不達藏性圓融者今經既以即相明心融空歸性安得不被圓實四者謂帶過三而無過一也帶過三者一恃他加被二恃聞忽定三恃性忘修者也無過一者即無上三過者也雖求加而務親證雖多聞而恆在定雖明性而極精修此則最上第一妙根極為所被之當機也舊解於此前五皆揀非機不知明言小根尚是當機豈有反揀大乘非機之理蓋斯經猶應病之藥在小根深病尚調治以起其危況大機微恙寧吝一劑而不為愈乎故經明敘小果而不顯標大乘者正謂難治尚治況於易治者哉是故通前十類均屬所被之機也五能詮體性者若依清凉明教體淺深廣有十種今從賢首略作四門一隨相門開之為二一聲名句文體以佛在世則音聲居多佛滅度後紙墨流傳則名句文多故凡有生解之義悉為教體設以此方他界廓而論之則不獨此也即六塵境界均得為體故有以香為佛事者有以飯作佛事者有以光明作佛事者有以天衣為佛事等二通攝所詮體上乃是文此則屬義故瑜伽論云諸契經體略有二種一文二義文為能詮義屬所詮故文義相隨而不相離方成隨相之教體也二唯識門謂攝上二體俱不離識以一切所有唯心現故然亦有二初本影相對次說聽全收初本影中若依清凉通就五教以成四句一唯本無影謂即小乘不知唯識故二亦本亦影即大乘始教謂佛宣說若文若義皆是如來妙觀察智相應淨識之所顯現名本智教若就聞者識上所變若文若義名為影像三唯影無本即大乘實教謂如實教緣起無性一切皆如唯有如如理及如如智獨存大悲大智為增上緣令彼所化根熟衆生心中現佛色聲說法是故聖教唯是衆生心中影像四非本非影即大乘頓教謂非獨心外無佛色聲並衆生心內影像亦空乃忘言絶慮無教之教耳故淨名云夫說法者無說無示其聽法者無聞無得是也通前四說總合為一即名圓教所謂圓融無礙本影俱融攝衆生也次說聽中復開為二一約同教以成四句二約別教以成四句今初四教同句者此以生佛互泯明同教義也一佛真心外無別衆生以衆生真心即佛真心故此則唯說無聽故所說教唯佛所現二衆生心外更無別佛以佛真心即衆生真心故此則唯聽無說故所說教唯衆生自現三佛真心現時不礙衆生真心現故說聽雙融二俱齊泯四佛即衆生故非佛衆生即佛故非生互奪雙亡則說聽俱寂二明別教四句者此以生佛互存明別教義也一衆生全在佛心中故則果門攝法無遺以衆生尚在佛心況所說教非佛心現二佛在衆生心中故則因門攝法無遺以佛尚在生心況所說教非生心現三由生佛互相俱在各實非虗則因果交徹隨一聖教全在二心故衆生心中佛為佛心中衆生說法佛心中衆生聽衆生心中佛說法四生全在佛則同佛乃至佛全在生則同生所以兩相再立因果齊彰故凡說聽皆俱同別但悟佛心中衆生無聽衆生心中佛無說則知此經歸無所得同別雙該乃為究竟甚深唯識三歸性門賢首云此攝所現之八識歸於能現之一心即是藏性故云歸性也四無礙門賢首謂於前三門心境理事同一緣起混融無礙交徹相攝以為教體以一心法有二門皆各攝一切法故是以生滅門收隨相唯識以真如門而收歸性則前門成心境無礙而後門成理事無礙矣故清凉廣演理事與事事無礙門末乃收歸海印三昧亦極盡無礙之旨然則斯經既正屬終教兼涉頓圓則於賢首清凉所判全門教體皆允協也六所詮宗趣即賢首所謂當部所崇曰宗宗之所歸曰趣然具通局兩門通謂一大時教局則專取本經彼於通中遍約諸教門類頗多茲不繁引今約總意略明宗趣於五時之教以明權實大槩夫權乘多重修成動彰因果則因即宗而果即趣也圓實多重性具貴在悟入則悟即宗而入即趣也斯經若泛就圓實一類之教取宗趣者則以悟明心地為宗證入果地為趣斯亦略明其槩也然彼局中義亦浩繁難以悉述今唯局定本經以取宗趣亦有總別總謂信解大定為宗修證極果為趣良以當機所請妙奢摩等而世尊所示如來藏心即性具圓融大定豈非一經之所宗乎當機欲請十方如來得成菩提而世尊示以入於如來妙莊嚴海圓滿菩提歸無所得即十方佛究竟極果豈非一經之所趣乎若明別意則有六對謂破顯偏全悟入體用行位分滿也是皆先宗後趣又皆躡前對之趣作後對之宗而復起其趣也一破顯者謂徵破識心為宗顯發根性為趣即委悉破妄識意在捨妄識而信認見聞等性也二偏全者謂偏指根性為宗全彰藏性為趣此即十番顯示偏明見精意在廓充解悟自近及遠所以會四科歷七大全歸乎藏性也三悟入者謂圓悟華屋為宗得門深入為趣此亦躡前全彰藏性即是圓悟華屋然所以必求圓悟華屋者意在得圓通一門初從入流忘所直至寂滅現前也四體用者謂證圓通體為宗發圓通用為趣此亦躡前一門深入即證此體然必證此體者意在發圓通三十二應等大自在用也五行位者謂運圓定行為宗歷圓因位為趣此亦躡前大用以為作略然此有二一利生作略二取果作異前三十二應但彰利生而隱取果茲運圓行正為取果然必運圓行者意在遍歷圓因五十五位也六分滿者謂歷分證聖位為宗取圓滿菩提為趣此亦躡圓因之位即分證位言必歷此位者意在圓滿菩提也是皆由圓信而發圓解因圓行而獲圓證一經宗趣由指諸掌所謂圓融次第二無礙矣七教迹前後者良以此經文辭深奧義理幽微猶雲中之龍出沒隱現首尾莫測是以古今判釋議論紛紜致令後學無本可據茲釋教迹先開二義一泛述古今二確定前後初泛述者竊謂今古諸師判時迥異然各有所見不無證據所以有判法華後涅槃前者如長慶真際長水孤山泐潭交光也有同前判尅定第四十九年說此經第五十年說涅槃者孤山也有判般若後法華前者溫陵也有判為方等後分者神智義也有云一家判攝規矩但非四時所攝悉得以方等收取者柏庭月也唯其本經事迹之在諸教前後者此順彼違甲伸乙破全無定案復有曲為和會者謂事緣在昔發起在今示迹在方等之時追敘在法華之後此臺山印也有云此經該五時貫五教判歸密部不定何時何教者憨山清也此上則略明而泛述也次確定者即長水所謂佛說此經非一時頓說說必前後集者約類總為一部謂佛初說匿王在座敘外致疑因除斷見後至阿難疑問七趣舉琉璃誅釋善星說空二俱生身陷入地獄琉璃豈非匿王之子王死為嗣方誅釋種豈有事之未形預致問耶故知此經非一時說斯判誠當乃千古之高論也然欲以斯經全歸法華之後涅槃之前則又似乎稍缺詳審致有溫陵之辨今以前後二分即開二章一曰正請正說二曰重請重說所以正說即前分重說即後分耳以正說確在法華之前重說定在法華之後此准因果經及釋迦譜以佛生之日天竺八王同日生子各製好名舍衛國太子名波斯匿又同日立為太子本經匿王請法自敘行年六十有二則佛年亦爾在成道後三十二年正應轉教說般若時且在祇園乃說般若將竟之處也又菩提留支法界性論云佛言我成道後四十二年說法華經若准經論證之則正說當在般若後而法華前矣以般若之後慧學雖彰定力未具於是如來示以楞嚴大定資其般若深慧欲其定慧均修解行兩全則密因萬行靡不究竟以至一切圓妙無復進修故法華會上純談妙法隨根印可授記作佛則如來出世本懷大事已畢故彼經云復經少時父知子意漸已通泰則斯正請正說皆少時之談耳故唯此經明破顯位次已後法華涅槃更無位次之說及破顯之談矣是知正說確在般若後法華前也次重說在法華後者以當機請問琉璃善星廣明七趣世尊再來憑倚自說五魔此皆重請重說以中阿含五十九匿王告佛我年八十則如來亦八十即匿王代謝之年正琉璃篡父滅釋之時而善星陷獄即涅槃之緣起也故遺教品云佛告阿難佛去世後尸波羅戒是汝大師故今辨魔文中廣言誹毀律儀即屬魔羅且云汝遵佛語即報佛恩豈非雙林顧命叮嚀囑咐之致意乎所以楞嚴初首涅槃末後淫攝魔撓神呪雙顯則此重說定在法華之後涅槃之前決無疑矣設以此說折衷諸師則長水前後二分誠是唯缺通前溫陵少時之說良是稍遺貫後即長慶真際孤山泐潭交光等師判法華後者皆是然亦不應局指一時所以古德有言說時不一古今異判今之融會頗異舊聞但期義暢非敢執諍尚冀高明曲為印可八傳譯時年者據開元中智升續古今譯經圖記謂極量乃中印土人梵名般剌密諦剖膊藏經泛海達廣寓制止寺值宰相房融謫嶺南聞有此經遂欲請譯師乃出之奈藏日久苦於血凝融妻以水清之始得明顯即就制止翻譯所以有彌伽譯語懷迪證譯房相筆授耳時在大唐神龍元年五月二十三日也然此經即灌頂部録出別行者而極量譯畢遂即回國以彼王嚴制不許斯經私出境外祕為國寶師既潛匿賫來未免邊境受責為解此難故速歸也及房相因南使附奏又值中宗初承大統國家多事不暇宣布時有神秀禪師於內道場因見奏本遂抄寫隨身携歸荊州度門寺後以魏北館陶振公仰慕斯經搜訪靈迹於度門寺方獲此本始為科判斯則當經來源始末傳譯時年之大概也九通釋名題二一經題大佛頂如來密因修證了義諸菩薩萬行首楞嚴經夫此一經佛說五名而譯人標題則存三隱二以約該博故茲能詮所詮共止二十言耳今初且明所詮一十九字若約文義應分總別如上三字即統明總相法體下十六字乃詳示別相妙用今且明總略開二釋一隨事釋二入理釋初隨事者大乃讚美之詞即大哉佛頂楞嚴也亦能讚之總稱而密因下皆所讚之別義若以此而稱別則密因是大因了義為大義萬行即大行楞嚴乃大定具此諸大足知斯經為大教也然則欲成菩提者可不依大教而生大信稱大理而發大解悟大理而起大行圓大行而證大果乎故大之為義未易盡言所謂佛者即梵語佛陀耶此名為覺乃自覺覺他覺行圓滿故稱為佛而曰頂者乃三十二相之無見頂相也在青螺紺髮之中如春山吐日者是矣而稱無見頂者即華嚴所謂初生即捧持諦觀不見頂者是也又金剛密迹經言佛成道後遊波羅奈東方有菩薩名應持來禮佛足欲量佛身以佛神力往至上方恆沙世界不見釋尊之頂往問蓮華世界彼佛答云更過恆沙世界亦不能見釋尊之頂若據此經則大佛頂無見相義可明矣次入理者蓋大佛頂乃三德祕藏為一心三大之異稱也大即當人法身當體得名以其此體遍周法界含攝森羅豎窮三際橫亘十方超言思之表絶朕兆之機無可得以稱之故強名而為大即體大也佛即當人般若覺照為義以其靈照不昧鑒覺全彰本無垢染及諸妄想清淨本然乃自性天真本來覺照故名為佛即用大也頂即當人解脫尊極之稱以其至尊至極無上無過為諸佛之所師乃羣聖之共仰故稱為頂此相大也以上三德三大皆統一心然此一心即本如來藏妙真如性亦是當人常住真心性淨明體故以一心釋大佛頂豈非起信所謂一法界大總相法門乎然此三字非止一題即在十軸亦稱總相以文言雖多而求佛所說無過顯密若以大佛頂而收攝之則罄無不盡故經初云有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路以是而觀則此三字總收顯說明矣而後又云佛頂光明摩訶悉怛多般怛囉無上神呪斯為如來無見頂相無為心佛從頂發揮坐寶蓮華所說心呪又曰亦說此呪名如來頂只此三字又總攝密說明矣此則統明總相法體竟次詳示別相妙用者亦開為二一詳果人妙用之相即初八字二示因人妙用之相即下八字今初明果相者如來二字即果人也密因修證了義皆妙用之相也蓋如來者十號之一倣同先德號也若隨相釋則諸佛一身一智應用亦然故後佛如先佛之再來故云倣同先德若入理釋則隨教淺深義有多種茲據終教如謂本覺來謂始覺始本究竟故名如來此舉一佛以該多佛也密因者若據當經之義則顯教微密密教祕密顯密二說俱能感果故曰密因若指當人之心則是諸佛在凡夫時欲求成佛親向六根門頭認取不生不滅妙明真心以為因地而修果位所以云我以不滅不生合如來藏者正明此心乃最微最密之因地也然世之人止知密非是顯因非是果又豈知如來修因時原不離於現前見色聞聲處耶即此六根門頭識取成佛真因所以一切分明無不究竟其如凡外權小逐境生心迷頭認影將謂離此別有真因向外馳求所以百姓日用而不知故謂之密非如來之因有密與不密者也以故淪生死者此也而證妙常者亦此也誠生佛之源聖凡之本捨此之外更無別法所以依此而修即了義之真修由此而證即了義之圓證故云十方婆伽梵一路涅槃門者此也是知密因者乃諸佛之因心而佛頂者即諸佛之果體也所以果人由證此體乃能自利利他隨機演教直指人心決了大義者正果人妙用之相也次明因相諸菩薩者因人也萬行首楞者明妙用之相也菩薩乃略梵具云菩提薩埵此名覺有情若據自利而言即覺已分證識情未盡設自他俱利而釋即上求大覺下化有情諸者衆多不一之辭如本經所明五十五位及各說圓通之衆而位次淺深階級不等故名為諸萬行者即諸位中歷修之行如十信則全根力而植佛種十住則生佛家而成佛子十行則廣六度而行佛事十向則回佛事而向佛心四加則泯心佛而滅數量十地則契真如而覆涅槃等覺則齊佛際而破生相此約本經以明萬行也若准大品般若則一切佛法諸三昧門謂百八三昧五百陀羅尼及諸解脫大慈大悲一切種智五眼六神通三明八解脫十力四無畏十八不共法三十二相八十種好六波羅密三十七品四弘誓願四無量心如意神通四攝等法故大品萬行偈云初從發心至成佛一身一心一智慧欲為教化衆生故萬行名字差別異須知菩薩之行收則一心放則無量茲云萬者乃隨世之極數豈菩薩之行而定局於萬哉首楞嚴者即大定之總名以能圓統諸定故稱為王故楞嚴三昧經云譬如轉輪聖王行時七寶皆從所以諸佛證此而菩薩修此凡外權小雖各具此然各迷此故涅槃經佛自釋云首楞者名一切事究竟嚴者名堅固即一切事究竟堅固如本經所謂五蘊六入十二處十八界以至七大此一切事也然皆本如來藏妙真如性此究竟堅固也在涅槃經亦名佛性以一切衆生悉有此故論云健相以能知諸三昧行相深淺如主兵寶將善知兵力多少所至之處無能摧伏亦名金剛三昧慈恩翻為金剛藏然皆不出堅固義也而諸菩薩修此三昧則能滅除諸生死因以獲無上二轉依果故得現身說法自在無礙所謂不起寂滅定而現諸威儀此為因人妙用之相也斯則詳示妙用明所詮竟次明能詮者蓋經之一字是能詮之文字般若也亦聖教之都名梵語修多羅古翻為契經契謂契理契機經謂貫穿攝持亦翻為線以線能貫花經能持緯此方不貴線稱故存於經古德因此方儒墨皆稱為經遂借彼席經以目聖教則雙含二義俱順兩方借義助名更加契字以揀異席經也若據佛地雜心諸論則有多義茲不煩贅要而言之不出於四所謂法常貫攝也謂依此言說詮顯性相令物生解故名為法一切諸佛皆同此說故名為常能令義理永無散失名之為貫以此化生令不墜墮稱之為攝此泛說也若欲的指本經所詮如來藏體說名經者亦有四義謂此心性諸佛所師可軌可則故名為法不生不滅無有變異故名為常上聖下凡無不同此故名為貫具諸功德遍含染淨故名為攝統收四義總目為經若准字義解釋則經者徑也謂此即是入妙莊嚴路之捷徑也然此二十字中若准古式作對釋者茲亦有六謂能所總別體用因果人法理事也夫能謂能詮即經之一字所謂所詮即上十九字總謂總相即大佛頂別謂別相即如來等十六字體謂法體即佛頂首楞用謂妙用即修證了義及諸萬行因謂因位即諸菩薩果謂果位即佛如來人謂因人果人即佛如來及諸菩薩法謂因法果法即密因了義萬行首楞理謂理性即密因首楞事謂事相即修證萬行若離合釋者茲約能所體用略作二釋一經為能詮但聲名句文故劣上皆所詮是性修等妙義故勝若經上加之字謂大佛頂首楞嚴之經即依主釋二經是教之自體上皆因果修證之用若經上加即字謂大佛頂等即經此持業釋也若准七種立題此當復中人法立題也一名中印度那爛陀大道場經於灌頂部録出別行此本經之別目也即長水所謂印度名月具云印特伽此云月以此大國形諸小國如星中月彼有五印此當中也即一境之都名一境之中有多國別最中大者號摩竭提此云大體以總攝故或云不害皆義翻也那爛陀此云施無厭龍名西域記云菴摩羅國有池池中有龍名施無厭寺近彼池故以標號大道場者沙門體心修道之地也佛滅度後六帝緝興遐疏紺宇園林普洽都建一門主客萬僧住持增峻印度諸寺莫先於此故名曰大道場也灌頂部者彼有五部此當其一毗盧為主既標部處尋驗可憑無謂近翻疑非正說別行者即融室云如大部楞伽分行經也以上經題竟二譯人三一主譯人天竺沙門般剌密諦譯首言天竺者指譯主生處也有名乾竺乾豆身毒印度者此梵音之楚夏也皆西域之總名此云月以有聖賢繼化如月之照臨又以大形小之謂也沙門此云勤息謂勤行善法息滅惡事此釋子之通稱般剌密諦此云極量乃譯師之別號譯之言易也謂易梵文而成華言耳周制有四方之官達四方之言東曰寄南曰象西曰狄鞮北曰譯今翻西語而曰譯者由漢世多事北方而譯人兼善西語因以稱焉又寄等四別也譯言通也然科為主譯者以此經未來盛名先至所以天台西向拜求一十八年終未得見以彼王祕為國寶師潛航海賫來夫禁艱苦志益此方功莫大焉且具通方才智總統譯場以至功成身退故首明譯主以尊元勳也二譯語人烏萇國沙門彌伽釋迦譯語烏具萇云烏仗那此云苑昔阿輸迦王之苑也或云烏場烏孫萇烏荼皆訛也乃北印度之屬境彌伽釋迦此云能降伏譯語即度語謂兼通華梵裁度兩方而合音義此譯語之任也此中證義應有懷迪後人略去茲亦不述三筆授人菩薩戒弟子前正議大夫同中書門下平章事清河房融筆授此明雖為宰官而受菩薩戒者故梵網經云欲受國王位乃至百官受位時應先受菩薩戒一切鬼神救護王身及百官身也弟子者皈依佛法以三寶為師者所以資於師長以父兄之道事之故云弟子前者舊也以下官名乃其舊職現已謫在廣州故云爾也正議者史稱正諫言官之名即諫議也大夫者即舉賢進能扶持名教大樹人材之尊稱也同者乃權兼二省即下之中書門下也此二省者即左右相府之名然中書多掌王言門下多出政事平章者平謂均平章謂憲章即均平政務憲章法度也故書云平章百姓事即政務法度等事也清河房融者以融乃清河人琯之父也天后長安四年甲辰十月繇懷州刺史拜正議大夫同鳳閣鸞臺平章事於中宗神龍元年乙巳二月除名流高州是以獲遇其事筆授者即秉筆確定文字者也謹按譯場專司次重筆授須才宏學博明辨華梵務使相當然後下筆故名筆授然融請譯筆授而兼潤文誠有大功於斯典矣以故同極量等並得冠之於卷首也
